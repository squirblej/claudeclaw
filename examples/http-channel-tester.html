<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClaudeClaw HTTP channel — tester</title>
  <style>
    :root { color-scheme: light dark; --fg: #222; --muted: #666; --user: #2563eb; --agent: #16a34a; --tool: #a16207; --err: #dc2626; --bg: #fff; --panel: #f6f7f8; }
    @media (prefers-color-scheme: dark) { :root { --fg: #eee; --muted: #aaa; --user: #60a5fa; --agent: #4ade80; --tool: #facc15; --err: #f87171; --bg: #18181b; --panel: #27272a; } }
    body { font-family: ui-sans-serif, system-ui, sans-serif; max-width: 920px; margin: 0 auto; padding: 16px; background: var(--bg); color: var(--fg); }
    h1 { font-size: 18px; margin: 0 0 12px; }
    fieldset { border: 1px solid #8884; border-radius: 6px; padding: 10px 14px; margin: 0 0 12px; background: var(--panel); }
    legend { font-size: 12px; color: var(--muted); padding: 0 6px; }
    label { display: block; font-size: 12px; color: var(--muted); margin: 6px 0 2px; }
    input, textarea, button { font: inherit; color: inherit; background: var(--bg); border: 1px solid #8884; border-radius: 4px; padding: 6px 8px; }
    input, textarea { width: 100%; box-sizing: border-box; }
    button { cursor: pointer; padding: 6px 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    #send-form textarea { min-height: 56px; resize: vertical; }
    #log { border: 1px solid #8884; border-radius: 6px; min-height: 400px; max-height: 60vh; overflow-y: auto; padding: 10px 14px; background: var(--panel); white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 13px; line-height: 1.45; }
    .msg { margin: 4px 0; }
    .msg .who { font-weight: 600; }
    .msg.user .who { color: var(--user); }
    .msg.agent .who { color: var(--agent); }
    .msg.tool .who { color: var(--tool); }
    .msg.err .who { color: var(--err); }
    .msg.sys { color: var(--muted); font-size: 11px; }
    .status { font-size: 11px; color: var(--muted); margin: 0 0 8px; }
    #status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #888; margin-right: 6px; vertical-align: middle; }
    #status-dot.on { background: #16a34a; }
    #status-dot.err { background: #dc2626; }
  </style>
</head>
<body>
  <h1>ClaudeClaw HTTP channel — tester</h1>

  <fieldset>
    <legend>Connection</legend>
    <div class="row">
      <div>
        <label for="base">Base URL</label>
        <input id="base" value="http://127.0.0.1:7088" />
      </div>
      <div>
        <label for="token">Service token (Bearer)</label>
        <input id="token" type="password" placeholder="settings.http.serviceToken" />
      </div>
    </div>
    <div class="row" style="margin-top: 6px;">
      <div>
        <label for="channel">channel_id</label>
        <input id="channel" value="trip:test" />
      </div>
      <div>
        <label for="agent">agent</label>
        <input id="agent" placeholder="agent name as configured" />
      </div>
    </div>
    <div class="row" style="margin-top: 6px;">
      <div>
        <label for="user_id">user_id</label>
        <input id="user_id" value="jack" />
      </div>
      <div style="display: flex; align-items: end; gap: 8px;">
        <button id="connect">Subscribe</button>
        <button id="disconnect" disabled>Disconnect</button>
      </div>
    </div>
    <p class="status"><span id="status-dot"></span><span id="status-text">disconnected</span></p>
  </fieldset>

  <fieldset>
    <legend>Send message</legend>
    <form id="send-form">
      <textarea id="content" placeholder="Type a message..."></textarea>
      <div style="margin-top: 6px; display: flex; gap: 8px; align-items: center;">
        <button type="submit" id="send-btn">Send</button>
        <label style="margin: 0;"><input type="checkbox" id="no_reply" /> no_reply (just broadcast)</label>
      </div>
    </form>
  </fieldset>

  <fieldset>
    <legend>Admin</legend>
    <div style="display: flex; gap: 8px; flex-wrap: wrap;">
      <button id="reset-btn" type="button">Reset session</button>
      <button id="delete-btn" type="button">Delete channel</button>
      <button id="list-btn" type="button">List channels</button>
    </div>
  </fieldset>

  <div id="log"></div>

  <script>
    const $ = (id) => document.getElementById(id);
    const log = $("log");
    const statusDot = $("status-dot");
    const statusText = $("status-text");
    let es = null;
    let currentAgentRun = null; // run_id of the message currently being assembled

    function appendMsg(cls, who, text) {
      const div = document.createElement("div");
      div.className = `msg ${cls}`;
      div.innerHTML = `<span class="who">${who}:</span> `;
      div.appendChild(document.createTextNode(text));
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

    function setStatus(state, text) {
      statusDot.className = state;
      statusText.textContent = text;
    }

    $("connect").addEventListener("click", () => {
      if (es) es.close();
      const base = $("base").value.trim().replace(/\/$/, "");
      const channel = encodeURIComponent($("channel").value.trim());
      const token = $("token").value.trim();
      if (!token) { alert("Service token required"); return; }
      // EventSource can't set custom headers — we put the token in the URL.
      // For the tester only; production frontends proxy through their backend
      // (see HTTP_FRONTEND_SPEC.md).
      // The server reads Authorization header, so SSE requires a custom approach;
      // we use fetch() + ReadableStream to stream with the header set.
      streamWithFetch(base, channel, token);
    });

    $("disconnect").addEventListener("click", () => {
      if (es && es.abort) es.abort();
      setStatus("", "disconnected");
      $("connect").disabled = false;
      $("disconnect").disabled = true;
    });

    async function streamWithFetch(base, channel, token) {
      const ctrl = new AbortController();
      es = { abort: () => ctrl.abort() };
      $("connect").disabled = true;
      $("disconnect").disabled = false;
      setStatus("on", `subscribed to ${decodeURIComponent(channel)}`);
      appendMsg("sys", "sys", `subscribing to ${base}/v1/channels/${channel}/stream`);
      try {
        const resp = await fetch(`${base}/v1/channels/${channel}/stream`, {
          headers: { Authorization: `Bearer ${token}` },
          signal: ctrl.signal,
        });
        if (!resp.ok) {
          const text = await resp.text();
          setStatus("err", `${resp.status} ${text}`);
          appendMsg("err", "err", `${resp.status} ${text}`);
          $("connect").disabled = false;
          $("disconnect").disabled = true;
          return;
        }
        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          let idx;
          while ((idx = buf.indexOf("\n\n")) !== -1) {
            const raw = buf.slice(0, idx);
            buf = buf.slice(idx + 2);
            handleSse(raw);
          }
        }
      } catch (err) {
        if (err.name !== "AbortError") {
          setStatus("err", String(err));
          appendMsg("err", "err", String(err));
        }
      } finally {
        $("connect").disabled = false;
        $("disconnect").disabled = true;
      }
    }

    function handleSse(raw) {
      const lines = raw.split("\n");
      let event = "message";
      let data = "";
      for (const ln of lines) {
        if (ln.startsWith("event: ")) event = ln.slice(7);
        else if (ln.startsWith("data: ")) data += ln.slice(6);
      }
      if (!data) return;
      let payload;
      try { payload = JSON.parse(data); } catch { return; }

      switch (event) {
        case "ping": return; // silent
        case "user_message":
          appendMsg("user", payload.user_id, payload.content);
          break;
        case "agent_token":
          if (!currentAgentRun || currentAgentRun.run_id !== payload.run_id) {
            currentAgentRun = { run_id: payload.run_id, el: appendMsg("agent", "agent", "") };
          }
          currentAgentRun.el.appendChild(document.createTextNode(payload.text));
          log.scrollTop = log.scrollHeight;
          break;
        case "tool_activity":
          appendMsg("tool", "tool", payload.text);
          break;
        case "agent_complete":
          appendMsg("sys", "sys", `agent_complete (${payload.run_id.slice(0, 8)})`);
          currentAgentRun = null;
          break;
        case "agent_busy":
          appendMsg("sys", "sys", `agent_busy=${payload.busy}`);
          break;
        case "error":
          appendMsg("err", "err", `${payload.code}: ${payload.message}`);
          break;
        default:
          appendMsg("sys", event, JSON.stringify(payload));
      }
    }

    async function adminCall(method, pathTail, expectBody) {
      const base = $("base").value.trim().replace(/\/$/, "");
      const channel = encodeURIComponent($("channel").value.trim());
      const token = $("token").value.trim();
      const agent = $("agent").value.trim();
      if (!token || !agent) { alert("token and agent required"); return; }
      const url = `${base}/v1/channels/${channel}${pathTail}?agent=${encodeURIComponent(agent)}`;
      try {
        const resp = await fetch(url, { method, headers: { Authorization: `Bearer ${token}` } });
        const text = await resp.text();
        const label = `${method} ${pathTail || "/"}`;
        if (resp.ok) appendMsg("sys", "admin", `${label} → ${resp.status} ${text || "(empty)"}`);
        else appendMsg("err", "admin", `${label} → ${resp.status} ${text}`);
      } catch (err) {
        appendMsg("err", "admin", `${method} ${pathTail}: ${err}`);
      }
    }

    $("reset-btn").addEventListener("click", () => adminCall("POST", "/reset"));
    $("delete-btn").addEventListener("click", () => adminCall("DELETE", ""));
    $("list-btn").addEventListener("click", async () => {
      const base = $("base").value.trim().replace(/\/$/, "");
      const token = $("token").value.trim();
      const agent = $("agent").value.trim();
      if (!token) { alert("token required"); return; }
      const url = `${base}/v1/channels${agent ? `?agent=${encodeURIComponent(agent)}` : ""}`;
      try {
        const resp = await fetch(url, { headers: { Authorization: `Bearer ${token}` } });
        const text = await resp.text();
        appendMsg("sys", "admin", `GET /v1/channels → ${resp.status}\n${text}`);
      } catch (err) {
        appendMsg("err", "admin", `GET /v1/channels: ${err}`);
      }
    });

    $("send-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const base = $("base").value.trim().replace(/\/$/, "");
      const channel = encodeURIComponent($("channel").value.trim());
      const token = $("token").value.trim();
      const agent = $("agent").value.trim();
      const user_id = $("user_id").value.trim();
      const content = $("content").value;
      if (!token || !agent || !user_id || !content) { alert("token, agent, user_id, content all required"); return; }
      const body = {
        agent, user_id, content,
        client_message_id: crypto.randomUUID(),
        no_reply: $("no_reply").checked,
      };
      $("send-btn").disabled = true;
      try {
        const resp = await fetch(`${base}/v1/channels/${channel}/messages`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}`, "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const text = await resp.text();
        if (!resp.ok) {
          appendMsg("err", "send", `${resp.status} ${text}`);
        } else {
          $("content").value = "";
        }
      } catch (err) {
        appendMsg("err", "send", String(err));
      } finally {
        $("send-btn").disabled = false;
      }
    });
  </script>
</body>
</html>
